name: Update Formula

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula to update"
        required: true
        type: choice
        options:
          - lockknife
          # Add more formulas here:
          # - exampletool
      version:
        description: "New version (e.g. v1.5.5)"
        required: true
        type: string

jobs:
  update:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve asset URL
        id: resolve
        run: |
          FORMULA="${{ inputs.formula }}"
          VERSION="${{ inputs.version }}"
          TAG="${VERSION}"
          BARE_VERSION="${VERSION#v}"

          # ──────────────────────────────────────────────────
          # Asset URL config — add new projects here
          # ──────────────────────────────────────────────────
          case "$FORMULA" in
            lockknife)
              REPO="ImKKingshuk/LockKnife"
              ASSET_NAME="lockknife-${BARE_VERSION}.tar.gz"
              ;;
            # exampletool)
            #   REPO="ImKKingshuk/exampletool"
            #   ASSET_NAME="exampletool-${BARE_VERSION}.tar.gz"
            #   ;;
            *)
              echo "::error::Unknown formula: $FORMULA"
              exit 1
              ;;
          esac

          ASSET_URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET_NAME}"
          echo "asset_url=${ASSET_URL}"       >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}"     >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"                   >> "$GITHUB_OUTPUT"
          echo "bare_version=${BARE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}"                 >> "$GITHUB_OUTPUT"

      - name: Download and compute SHA-256
        id: sha
        run: |
          echo "Downloading: ${{ steps.resolve.outputs.asset_name }}"
          curl -fsSL -o /tmp/asset "${{ steps.resolve.outputs.asset_url }}"
          SHA=$(shasum -a 256 /tmp/asset | awk '{print $1}')
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "SHA-256: ${SHA}"

      - name: Update formula file
        run: |
          FORMULA_PATH="Formula/${{ inputs.formula }}.rb"

          # Update download URL
          sed -i '' "s|releases/download/[^/]*/[^\"]*|releases/download/${{ steps.resolve.outputs.tag }}/${{ steps.resolve.outputs.asset_name }}|" "$FORMULA_PATH"

          # Update SHA-256
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"${{ steps.sha.outputs.sha }}\"/" "$FORMULA_PATH"

          echo ""
          echo "=== Updated $FORMULA_PATH ==="
          cat "$FORMULA_PATH"

      - name: Commit formula update locally
        run: |
          git config --global user.name '${{ github.actor }}'
          git config --global user.email '${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com'
          git add "Formula/${{ inputs.formula }}.rb"
          git commit -m "formula: update ${{ inputs.formula }} to ${{ inputs.version }}"

      - name: Validate formula with Homebrew
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_ENV_HINTS: "1"
        run: |
          FORMULA_NAME="${{ inputs.formula }}"
          TAP_NAME="ImKKingshuk/tap"

          brew untap "${TAP_NAME}" 2>/dev/null || true

          brew tap "${TAP_NAME}" "$GITHUB_WORKSPACE"

          brew audit --strict "${TAP_NAME}/${FORMULA_NAME}"
          brew install --build-from-source "${TAP_NAME}/${FORMULA_NAME}"
          brew test "${TAP_NAME}/${FORMULA_NAME}"

      - name: Push
        run: |
          git fetch origin main
          git rebase origin/main
          git push
